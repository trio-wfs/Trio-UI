name: Deploy showcase to GitHub Pages

# Fires on every push to main, plus a manual run button in the Actions tab.
# The showcase site rebuilds itself on each main update, so any commit that
# touches a showcase HTML or component immediately becomes browsable.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages needs id-token: write so deploy-pages can attest the artifact;
# pages: write so it can publish. contents: read for checkout.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. New pushes during a deploy queue and run after.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Match local dev (npm 11 from Node 24) so npm ci doesn't reject
          # lock-file entries generated by a different npm version.
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        # See note in publish.yml — `npm ci` rejects the lock for a nested
        # peer-dep arrangement that npm 11 considers inconsistent. `npm install`
        # works around it without affecting the deployed showcase artifact.
        run: npm install --no-audit --no-fund

      # SHOWCASE_BASE tells Vite to emit chunk URLs prefixed with /Trio-UI/...
      # — required because GitHub Pages serves project sites under the repo
      # name, not the org root.
      - name: Build showcase bundle
        run: npm run build:showcase
        env:
          SHOWCASE_BASE: /Trio-UI/showcase/dist/

      # Stage only what Pages should serve into _site/. Keeps node_modules
      # and the npm library dist (the package payload) out of the public
      # site footprint. Wildcards on root .html/.css/.js so any new pages
      # added to the repo root automatically deploy without workflow edits.
      - name: Stage Pages artifact
        run: |
          mkdir _site
          cp *.html _site/
          cp *.css _site/
          cp *.js _site/
          cp -r components _site/
          cp -r showcase _site/
          cp -r design-tokens _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
