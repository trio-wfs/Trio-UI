name: Publish to GitHub Packages

# Fires when a tag matching v* is pushed (e.g. v1.0.0, v1.2.3).
# Trigger from your laptop with:  git tag v1.0.0 && git push --tags
#
# workflow_dispatch lets you re-run from the Actions tab without pushing
# a new tag — useful for debugging or retrying after a transient failure.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    # Least-privilege: this workflow only needs to read the repo source and
    # write to GitHub Packages. It deliberately can't push commits, open PRs,
    # or modify other repo settings.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      # Sets up Node + writes an .npmrc pointing the @trio-wfs scope at
      # GitHub Packages so `npm publish` knows where to send the tarball.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11, matching local dev. Lock files generated
          # by npm 11 can be incompatible with npm 10's stricter `npm ci`
          # check, so we pin to keep CI and dev consistent.
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@trio-wfs'
          cache: 'npm'

      - name: Install dependencies
        # Using `npm install` instead of `npm ci` because `npm ci` strict-checks
        # the lock file against package.json in a way that's incompatible with
        # certain nested-peer-dep arrangements (notably @rolldown's wasm32-wasi
        # binding pulling in @emnapi/core+runtime at a different version than
        # other consumers). `install` re-resolves on each run, which is fine for
        # publish where the shipped artifact is dist/, not node_modules.
        run: npm install --no-audit --no-fund

      - name: Build package
        run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          # GITHUB_TOKEN is auto-injected by Actions. On public repos it
          # often has broader default scopes than on private repos, which
          # may let us bypass the org-level PAT restriction that blocked
          # earlier publish attempts. If this still fails, swap back to
          # secrets.NPM_PUBLISH_TOKEN (kept on file).
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
